{% extends "base.html" %}
{% block title %}DeepDive · Working{% endblock %}
{% block content %}
<div class="card">
  <h1>{{ heading }}</h1>
  <p class="muted">{{ subheading }}</p>

  <div class="progress-stage" id="stage-label">Starting…</div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-meta">
    <span id="progress-pct">0%</span>
    <span id="progress-elapsed">0s</span>
  </div>

  {% if show_cancel %}
    <div class="actions" style="margin-top:20px;">
      <button type="button" class="btn btn-ghost" id="cancel-btn">Cancel</button>
    </div>
  {% endif %}

  <div id="error-box" style="display:none; margin-top:24px;">
    <p class="mono" id="error-text" style="color:#8a3b3b;"></p>
    <a href="{{ url_for('index') }}" class="btn btn-ghost">Back</a>
  </div>
</div>

<script>
  const jobId = {{ job_id | tojson }};
  const progressUrl = {{ progress_url | tojson }};
  const resultsUrlPrefix = {{ results_url_prefix | tojson }};
  {% if show_cancel %}const cancelUrl = {{ cancel_url | tojson }};{% endif %}

  const startTime = Date.now();
  const fill = document.getElementById('progress-fill');
  const pctLabel = document.getElementById('progress-pct');
  const stageLabel = document.getElementById('stage-label');
  const elapsedLabel = document.getElementById('progress-elapsed');
  const errorBox = document.getElementById('error-box');
  const errorText = document.getElementById('error-text');
  const cancelBtn = document.getElementById('cancel-btn');

  function tickElapsed() {
    const s = Math.floor((Date.now() - startTime) / 1000);
    elapsedLabel.textContent = s < 60 ? (s + 's') : (Math.floor(s / 60) + 'm ' + (s % 60) + 's');
  }
  setInterval(tickElapsed, 1000);

  if (cancelBtn) {
    cancelBtn.addEventListener('click', function () {
      cancelBtn.disabled = true;
      cancelBtn.textContent = 'Cancelling\u2026 (finishing current artist)';
      fetch(cancelUrl, { method: 'POST' }).catch(() => {});
    });
  }

  async function poll() {
    try {
      const res = await fetch(progressUrl);
      if (!res.ok) {
        throw new Error('lost track of this job');
      }
      const data = await res.json();

      fill.style.width = data.percent + '%';
      pctLabel.textContent = data.percent + '%';
      if (data.stage) stageLabel.textContent = data.stage;
      document.title = '(' + data.percent + '%) DeepDive \u00b7 Working';

      if (data.status === 'done' || data.status === 'cancelled') {
        stageLabel.textContent = data.status === 'cancelled'
          ? 'Cancelled \u2014 loading what was found so far\u2026'
          : 'Done \u2014 loading results\u2026';
        document.title = 'DeepDive \u00b7 Done';
        window.location.href = resultsUrlPrefix + data.result_id;
        return;
      }
      if (data.status === 'error') {
        errorBox.style.display = 'block';
        errorText.textContent = data.error || 'Something went wrong.';
        document.title = 'DeepDive \u00b7 Error';
        return;
      }
      setTimeout(poll, 700);
    } catch (e) {
      errorBox.style.display = 'block';
      errorText.textContent = 'Lost connection while checking progress. It may still be running \u2014 try going back and checking again.';
    }
  }
  poll();
</script>
{% endblock %}
