<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>DeepDive</title>
<style>
  body {
    margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #FFFFFF; color: #0A0A0A; font-family: 'Inter', system-ui, sans-serif; text-align: center;
  }
  p { opacity: 0.7; font-size: 14px; }
</style>
</head>
<body>
  <div>
    <p>{{ message }}</p>
    <p><a href="{{ url_for('index') }}" style="color:#0A0A0A; text-decoration: underline;">Continue</a></p>
  </div>
  <script>
    // If this loaded inside the popup window we opened for auth, tell the
    // main tab we're done and close ourselves. Otherwise (e.g. someone
    // opened this URL directly, or the popup got blocked and Spotify
    // navigated the main tab instead) just fall through to the link above.
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage(
        { source: "deepdive-auth", ok: {{ "true" if ok else "false" }} },
        window.location.origin
      );
      window.close();
    } else if ({{ "true" if ok else "false" }}) {
      window.location.href = "{{ url_for('index') }}";
    }
  </script>
</body>
</html>
